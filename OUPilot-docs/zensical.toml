[project]
site_name        = "OUPilot"
site_description = "Rechner zu AD-Software-Gruppen hinzufügen (MECM-Deployment) · WPF/PowerShell · v1.4.0"
site_author      = "LucentTools"
copyright        = "Copyright &copy; 2026 LucentTools"

docs_dir = "docs"
site_dir = "site"

extra_css = ["stylesheets/extra.css"]
extra_javascript = [
  { path = "javascripts/mermaid.min.js", defer = true },
  "javascripts/mermaid-init.js",
  "javascripts/palette-init.js",
  "javascripts/activity-heatmap.js",
  "javascripts/icon-rail.js",
  "javascripts/hub-stop.js",
  "javascripts/lightbox.js",
]

nav = [
  { "Überblick" = "index.md" },
  { "Grundlagen" = [
    { "Installation" = "grundlagen/installation.md" },
    { "Schnellstart" = "grundlagen/schnellstart.md" },
  ]},
  { "Referenz" = [
    { "AD-Auslesen"          = "referenz/ad-auslesen.md" },
    { "AD-Schreiben"         = "referenz/ad-schreiben.md" },
    { "Import-Wege"          = "referenz/import-wege.md" },
    { "Mitglieder entfernen" = "referenz/mitglieder-entfernen.md" },
    { "Baum-Filter"          = "referenz/baum-filter.md" },
    { "Darstellung (Theme)"  = "referenz/theme.md" },
    { "Feld-Map"             = "referenz/feld-map.md" },
  ]},
  { "Betrieb" = [
    { "Testclient-Checkliste" = "betrieb/testclient.md" },
  ]},
  { "Entwicklung" = [
    { "Projektstruktur" = "entwicklung/projektstruktur.md" },
    { "Changelog"       = "entwicklung/changelog.md" },
  ]},
]

[project.theme]
language = "de"
font    = false   # Google Fonts CDN deaktivieren (No-CDN-Policy)
features = [
  "navigation.sections",
  "navigation.top",
  "search.highlight",
  "content.code.copy",
]

[[project.theme.palette]]
media   = "(prefers-color-scheme: light)"
scheme  = "default"
primary = "custom"
accent  = "custom"
toggle.icon = "material/weather-night"
toggle.name = "Dunkelmodus aktivieren"

[[project.theme.palette]]
media   = "(prefers-color-scheme: dark)"
scheme  = "slate"
primary = "custom"
accent  = "custom"
toggle.icon = "material/weather-sunny"
toggle.name = "Hellmodus aktivieren"
